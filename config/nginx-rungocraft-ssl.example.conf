

server {
    listen 443 ssl;
    server_name rungocraft.local localhost;
    root /var/RungoCraft/html;
    index index.php index.html;

    ssl_certificate /var/RungoCraft/ssl/rungocraft-local.crt;
    ssl_certificate_key /var/RungoCraft/ssl/rungocraft-local.key;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
    }
}
