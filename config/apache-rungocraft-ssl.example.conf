


<VirtualHost *:443>
    ServerName rungocraft.local
    DocumentRoot "/var/RungoCraft/html"

    SSLEngine on
    SSLCertificateFile "/var/RungoCraft/ssl/rungocraft-local.crt"
    SSLCertificateKeyFile "/var/RungoCraft/ssl/rungocraft-local.key"

    <Directory "/var/RungoCraft/html">
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rungocraft_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/rungocraft_ssl_access.log combined
</VirtualHost>
